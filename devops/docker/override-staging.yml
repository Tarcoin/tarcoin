version: "3.8"
# Staging override — resource limits + staging env + self-signed SSL
# Usage: docker compose -f ../docker/docker-compose.yml -f override-staging.yml up

services:
  website:
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.staging.tarcoin.org
      - NEXT_PUBLIC_EXPLORER_URL=https://explorer.staging.tarcoin.org
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  explorer:
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  explorer-frontend:
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_EXPLORER_API=https://explorer.staging.tarcoin.org
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  api:
    environment:
      - NODE_ENV=production
      - CORS_ORIGIN=https://staging.tarcoin.org
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  mining-pool:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  tarcoind:
    # Staging uses less cache
    command: ["-printtoconsole", "-dbcache=128", "-maxmempool=100"]

  nginx:
    # Self-signed certs for staging — generated by ssl-setup.sh --staging
    volumes:
      - ../docker/nginx/ssl:/etc/nginx/ssl:ro
    environment:
      - STAGING=true
