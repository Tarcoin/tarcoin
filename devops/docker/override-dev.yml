version: "3.8"
# Development override — hot reload + open ports + no SSL
# Usage: docker compose -f ../docker/docker-compose.yml -f override-dev.yml up

services:
  website:
    volumes:
      - ../../website:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_EXPLORER_URL=http://localhost:4000
      - NEXT_PUBLIC_POOL_URL=http://localhost:3001

  explorer:
    volumes:
      - ../../explorer/src:/app/src
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug

  explorer-frontend:
    volumes:
      - ../../explorer/frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_EXPLORER_API=http://localhost:4000

  api:
    volumes:
      - ../../api/src:/app/src
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - CORS_ORIGIN=*

  mining-pool:
    volumes:
      - ../../mining_pool/src:/app/src
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug

  nginx:
    # In dev use simple HTTP config — no SSL needed
    volumes:
      - ./nginx-dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"    # HTTP only in dev

  tarcoind:
    ports:
      - "19332:19332"   # Expose RPC directly in dev
      - "19333:19333"

  redis:
    ports:
      - "6379:6379"     # Expose Redis in dev

  postgres:
    ports:
      - "5432:5432"     # Expose Postgres in dev

  prometheus:
    ports:
      - "9090:9090"

  grafana:
    ports:
      - "3002:3000"
