# TARCOIN Nginx Reverse Proxy Configuration
# Hardened security configuration with DDoS protection

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main buffer=512k flush=1m;
    error_log /var/log/nginx/error.log warn;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=explorer:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=website:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # SSL configuration
    ssl_protocols TLSv1.3;
    ssl_ciphers 'TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;

    # Upstream servers
    upstream website_upstream {
        server website:3000;
        keepalive 64;
    }

    upstream explorer_upstream {
        server explorer:4000;
        keepalive 64;
    }

    upstream api_upstream {
        server api:5000;
        keepalive 64;
    }

    upstream pool_upstream {
        server mining-pool:3001;
        keepalive 64;
    }

    # Main website
    server {
        listen 443 ssl http2;
        server_name tarcoin.org www.tarcoin.org;

        ssl_certificate /etc/nginx/ssl/tarcoin.org.crt;
        ssl_certificate_key /etc/nginx/ssl/tarcoin.org.key;

        # Rate limiting
        limit_req zone=website burst=200 nodelay;
        limit_conn conn_limit 50;

        # Security
        if ($http_user_agent ~* (bot|crawler|spider)) {
            # Allow legitimate bots
        }

        location / {
            proxy_pass http://website_upstream;
            proxy_redirect off;
        }

        location /_next/static {
            proxy_pass http://website_upstream;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        location /static {
            proxy_pass http://website_upstream;
            expires 30d;
            add_header Cache-Control "public";
        }
    }

    # Blockchain Explorer
    server {
        listen 443 ssl http2;
        server_name explorer.tarcoin.org;

        ssl_certificate /etc/nginx/ssl/explorer.tarcoin.org.crt;
        ssl_certificate_key /etc/nginx/ssl/explorer.tarcoin.org.key;

        limit_req zone=explorer burst=100 nodelay;
        limit_conn conn_limit 30;

        location / {
            proxy_pass http://explorer_upstream;
            proxy_redirect off;
        }

        location /api {
            proxy_pass http://explorer_upstream;
            limit_req zone=api burst=50 nodelay;
        }

        location /ws {
            proxy_pass http://explorer_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }

    # REST API
    server {
        listen 443 ssl http2;
        server_name api.tarcoin.org;

        ssl_certificate /etc/nginx/ssl/api.tarcoin.org.crt;
        ssl_certificate_key /etc/nginx/ssl/api.tarcoin.org.key;

        limit_req zone=api burst=50 nodelay;
        limit_conn conn_limit 20;

        location / {
            proxy_pass http://api_upstream;
            proxy_redirect off;
        }

        location /api/v1 {
            proxy_pass http://api_upstream;
            limit_req zone=api burst=30 nodelay;
        }

        location /api/docs {
            proxy_pass http://api_upstream;
        }
    }

    # Mining Pool
    server {
        listen 443 ssl http2;
        server_name pool.tarcoin.org;

        ssl_certificate /etc/nginx/ssl/pool.tarcoin.org.crt;
        ssl_certificate_key /etc/nginx/ssl/pool.tarcoin.org.key;

        limit_req zone=api burst=50 nodelay;
        limit_conn conn_limit 20;

        location / {
            proxy_pass http://pool_upstream;
            proxy_redirect off;
        }

        location /api/pool {
            proxy_pass http://pool_upstream;
        }
    }

    # Stratum endpoint (separate port for mining)
    server {
        listen 3333 ssl;
        server_name stratum.tarcoin.org;

        ssl_certificate /etc/nginx/ssl/stratum.tarcoin.org.crt;
        ssl_certificate_key /etc/nginx/ssl/stratum.tarcoin.org.key;

        # Stratum WebSocket proxy
        location / {
            proxy_pass http://mining-pool:3333;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }

    # HTTP redirect to HTTPS
    server {
        listen 80;
        server_name tarcoin.org www.tarcoin.org explorer.tarcoin.org api.tarcoin.org pool.tarcoin.org stratum.tarcoin.org;
        return 301 https://$server_name$request_uri;
    }

    # Block common exploits
    location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi) {
        deny all;
        return 403;
    }

    location ~ /\. {
        deny all;
        return 403;
    }

    location ~ /(wp-admin|wp-content|wp-includes) {
        deny all;
        return 403;
    }
}