name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --oneline --no-merges)
          else
            CHANGES=$(git log --oneline --no-merges -20)
          fi
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: TARCOIN ${{ github.ref_name }}
          body: |
            ## TARCOIN ${{ github.ref_name }}

            ### Network Parameters
            - Chain: **mainnet**
            - Genesis: `000074c6359f78730790275ea21bbd53f0bc3249604470bad49b9753f44bd7e0`
            - P2P Port: **19333** | RPC Port: **19332**
            - Algorithm: SHA256d Proof-of-Work

            ### Changes
            ```
            ${{ steps.changelog.outputs.CHANGES }}
            ```

            ### Services
            | Service | Port |
            |---------|------|
            | tarcoind | 19333 (P2P), 19332 (RPC) |
            | Explorer API | 4000 |
            | Explorer UI | 4001 |
            | REST API | 5000 |
            | Mining Pool | 3001 (HTTP), 3333 (Stratum) |
            | Website | 3000 |

            ### Quick Start
            ```bash
            git clone https://github.com/tarcoin/tarcoin.git
            cd tarcoin
            cp docker/.env.example docker/.env
            # Edit docker/.env with your settings
            cd docker && docker compose up -d
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          token: ${{ secrets.GITHUB_TOKEN }}
