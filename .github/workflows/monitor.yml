name: Node Health Monitor

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes
  workflow_dispatch:

jobs:
  monitor:
    name: Check Network Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check public RPC node
        id: rpc_check
        continue-on-error: true
        run: |
          RESPONSE=$(curl -sf --max-time 10 \
            --user tarcoin:tarcoin \
            https://rpc.tarcoin.org \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"getblockchaininfo","params":[]}' || echo "FAILED")
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          if echo "$RESPONSE" | grep -q "FAILED"; then
            echo "status=down" >> $GITHUB_OUTPUT
          else
            BLOCKS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result']['blocks'])" 2>/dev/null || echo "0")
            echo "status=up" >> $GITHUB_OUTPUT
            echo "blocks=$BLOCKS" >> $GITHUB_OUTPUT
          fi

      - name: Check explorer API
        id: explorer_check
        continue-on-error: true
        run: |
          STATUS=$(curl -sf --max-time 10 -o /dev/null -w "%{http_code}" https://explorer.tarcoin.org/api/health || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Check main website
        id: website_check
        continue-on-error: true
        run: |
          STATUS=$(curl -sf --max-time 10 -o /dev/null -w "%{http_code}" https://tarcoin.org || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Alert on failure
        if: steps.rpc_check.outputs.status == 'down' || steps.explorer_check.outputs.status != '200' || steps.website_check.outputs.status != '200'
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"embeds\": [{
                \"title\": \"⚠️ TARCOIN Network Alert\",
                \"color\": 15158332,
                \"fields\": [
                  {\"name\": \"RPC Node\", \"value\": \"${{ steps.rpc_check.outputs.status }}\", \"inline\": true},
                  {\"name\": \"Explorer\", \"value\": \"HTTP ${{ steps.explorer_check.outputs.status }}\", \"inline\": true},
                  {\"name\": \"Website\", \"value\": \"HTTP ${{ steps.website_check.outputs.status }}\", \"inline\": true},
                  {\"name\": \"Block Height\", \"value\": \"${{ steps.rpc_check.outputs.blocks || 'unknown' }}\", \"inline\": true}
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" || true
